<html lang="ko">

    <style>
      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        font-family: "Manrope", "Noto Sans KR", sans-serif;
        background: linear-gradient(180deg, #fbfdff 0%, #f2f6fd 100%);
      }

      .boot-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .boot-card {
        width: min(560px, 100%);
        padding: 28px;
        border: 1px solid rgba(21, 79, 157, 0.12);

        box-shadow: 0 24px 60px rgba(18, 52, 105, 0.1);

      }

      .boot-card strong {
        display: block;
        margin-bottom: 10px;
        font-size: 1.25rem;
        line-height: 1.4;
      }

      .boot-card p {
        margin: 0;
        color: #67758f;
        line-height: 1.8;
      }
    </style>
    <script>
      (function () {
        var normalizedPath = window.location.pathname.replace(/\\/g, "/");
        window.__tax12FileMode = window.location.protocol === "file:";
        window.__tax12AssetBase = /\/dist\/index\.html$/i.test(normalizedPath) ? "../" : "./";
        if (window.__tax12FileMode) {
          var fileCss = document.createElement("link");
          fileCss.rel = "stylesheet";
          fileCss.href = window.__tax12AssetBase + "file-app.css";
          document.head.appendChild(fileCss);
        }
      })();
    </script>

    <script>
      (function () {
        var script = document.createElement("script");
        if (window.__tax12FileMode) {
          script.src = window.__tax12AssetBase + "file-app.js";
        } else {
          script.type = "module";
          script.src = "/src/main.tsx";
        }
        document.body.appendChild(script);
      })();
    </script>
